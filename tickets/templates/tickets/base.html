<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartSupport Dispatcher</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .violated { background-color: #ffcccc; }
        .high-priority { border-left: 4px solid red; }
        .medium-priority { border-left: 4px solid orange; }
        .low-priority { border-left: 4px solid green; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="{% url 'index' %}">📋 SmartSupport Dispatcher</a>
            <div class="navbar-nav">
                <a class="nav-link" href="{% url 'schedule' %}">Расписание</a>
                <a class="nav-link" href="{% url 'add_ticket' %}">+ Новая заявка</a>
                <a class="nav-link" href="{% url 'auto_assign_all' %}">Автоназначение</a>
                <a class="nav-link" href="/admin">Админка</a>
            </div>
        </div>
    </nav>
    
    <div class="container mt-4">
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            {% endfor %}
        {% endif %}
        
        {% block content %}
        {% endblock %}
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
