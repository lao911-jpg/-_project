{% extends 'tickets/base.html' %}

{% block content %}
<h2>Переназначение заявки #{{ ticket.id }}</h2>
<form method="post">
    {% csrf_token %}
    <div class="mb-3">
        <label class="form-label">Выберите инженера с компетенцией "{{ ticket.required_competence.name }}"</label>
        <select name="engineer_id" class="form-select" required>
            {% for eng in engineers %}
            <option value="{{ eng.id }}">{{ eng.name }}</option>
            {% endfor %}
        </select>
    </div>
    <button type="submit" class="btn btn-primary">Подтвердить</button>
    <a href="{% url 'schedule' %}" class="btn btn-secondary">Отмена</a>
</form>
{% endblock %}
